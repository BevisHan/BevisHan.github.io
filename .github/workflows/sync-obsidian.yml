name: "Sync Obsidian Notes"
on:
  push:
    branches:
      - main
    paths:
      - "_notes/**"

  # 也可以手动触发
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync notes to posts
        run: |
          python3 scripts/sync-notes.py

      - name: Commit changes
        run: |
          git config user.name "BevisHan[bot]"
          git config user.email "bevis@example.com"
          git add _posts/
          git diff --staged --quiet || git commit -m "chore: auto-sync Obsidian notes to posts"
          git push
